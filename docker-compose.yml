services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: food_diary
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 512M
        limits:
          cpus: '1.0'
          memory: 1G

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/food_diary
      SECRET_KEY: K7#mX2$$pL9@nQ4&vR1!wZ6*jY3^hT8%s
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
      - easyocr_cache:/root/.EasyOCR
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --loop asyncio --no-access-log
    
    mem_swappiness: 0
    memswap_limit: 3G
    deploy:
      resources:
        reservations:
          cpus: '1.0'
          memory: 1.5G
        limits:
          cpus: '2.0'
          memory: 5G
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
  hf_cache:
  easyocr_cache:
